<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="900" viewBox="0 0 1440 900">
  <rect width="1440" height="900" fill="#ffffff"/>
  <style>
    .sans{font-family:Inter,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
    .mono{font-family:"SFMono-Regular",Consolas,monospace}
  </style>

  <g class="sans">
    <text x="54" y="59" font-size="21" font-weight="750" fill="#22231f">EverFree</text>
    <text x="1122" y="57" font-size="13" fill="#70726b">How it works</text>
    <text x="1233" y="57" font-size="13" fill="#70726b">Source</text>
    <rect x="1302" y="31" width="97" height="39" rx="6" fill="#2f684a"/>
    <text x="1350" y="56" font-size="13" font-weight="650" fill="#fff" text-anchor="middle">Try it</text>
  </g>

  <g class="sans" text-anchor="middle">
    <text x="720" y="143" font-size="50" font-weight="650" letter-spacing="-2.1" fill="#22231f">Leave Evernote. Keep your notes.</text>
    <text x="720" y="192" font-size="18" fill="#70726b">A simple migration to Markdown files you control.</text>
    <rect x="557" y="228" width="158" height="47" rx="6" fill="#2f684a"/>
    <text x="636" y="257" font-size="14" font-weight="650" fill="#fff">Download Mac app</text>
    <rect x="728" y="228" width="155" height="47" rx="6" fill="#fff" stroke="#cfd0ca"/>
    <text x="805" y="257" font-size="14" font-weight="650" fill="#22231f">Continue on web</text>
  </g>

  <!-- Product dominates -->
  <g transform="translate(120 330)">
    <rect x="10" y="12" width="1180" height="456" rx="10" fill="#d9ddd7" opacity=".55"/>
    <rect width="1200" height="456" rx="10" fill="#fff" stroke="#cfd0ca"/>
    <rect width="1200" height="39" rx="10" fill="#f3f4f1"/>
    <circle cx="21" cy="19" r="5" fill="#d0d1cc"/>
    <circle cx="38" cy="19" r="5" fill="#d0d1cc"/>
    <circle cx="55" cy="19" r="5" fill="#d0d1cc"/>
    <text x="600" y="24" class="mono" font-size="9" fill="#797b74" text-anchor="middle">EverFree</text>

    <rect y="39" width="270" height="417" fill="#f5f5f2"/>
    <text x="24" y="78" class="sans" font-size="14" font-weight="700" fill="#22231f">Library</text>
    <rect x="19" y="94" width="232" height="31" rx="5" fill="#e9eae6"/>
    <text x="33" y="114" class="sans" font-size="10" fill="#85877f">Search everything…</text>
    <text x="23" y="160" class="sans" font-size="10" font-weight="700" fill="#85877f">NOTEBOOKS</text>
    <text x="28" y="194" class="sans" font-size="12" fill="#555750">⌄ Journal</text>
    <rect x="25" y="207" width="221" height="34" rx="5" fill="#e0e9e3"/>
    <text x="46" y="229" class="sans" font-size="11" fill="#2f684a">The move to plain text</text>
    <text x="46" y="262" class="sans" font-size="11" fill="#70726b">June notes</text>
    <text x="28" y="309" class="sans" font-size="12" fill="#555750">› Projects</text>
    <text x="28" y="343" class="sans" font-size="12" fill="#555750">› Archive</text>
    <line x1="18" y1="399" x2="252" y2="399" stroke="#dedfd9"/>
    <text x="24" y="428" class="sans" font-size="10" fill="#85877f">● Synced to GitHub</text>

    <rect x="270" y="39" width="930" height="44" fill="#fff" stroke="#e3e4df"/>
    <text x="298" y="66" class="mono" font-size="9" fill="#85877f">Journal / The move to plain text.md</text>
    <text x="1115" y="66" class="sans" font-size="10" fill="#85877f">Saved</text>

    <text x="410" y="146" class="sans" font-size="32" font-weight="650" fill="#22231f">The move to plain text</text>
    <text x="410" y="191" class="sans" font-size="15" fill="#70726b">June 22, 2026</text>
    <text x="410" y="244" class="sans" font-size="16" fill="#2f302c">A note should not need a special app to survive.</text>
    <text x="410" y="278" class="sans" font-size="16" fill="#2f302c">EverFree keeps this document as an ordinary Markdown file.</text>
    <text x="410" y="312" class="sans" font-size="16" fill="#2f302c">I can open it elsewhere, inspect its history, or leave at any time.</text>
    <rect x="410" y="354" width="590" height="55" rx="5" fill="#f5f5f2"/>
    <text x="430" y="379" class="mono" font-size="10" fill="#2f684a">Journal/The move to plain text.md</text>
    <text x="430" y="397" class="mono" font-size="9" fill="#85877f">private repository · committed moments ago</text>
  </g>

  <g class="sans">
    <text x="317" y="844" font-size="14" font-weight="650" fill="#22231f">Evernote</text>
    <path d="M408 839h104" stroke="#b9bbb4" stroke-width="2"/>
    <path d="M505 833l9 6-9 6" fill="none" stroke="#b9bbb4" stroke-width="2"/>
    <text x="550" y="844" font-size="14" font-weight="650" fill="#22231f">Markdown</text>
    <path d="M650 839h104" stroke="#b9bbb4" stroke-width="2"/>
    <path d="M747 833l9 6-9 6" fill="none" stroke="#b9bbb4" stroke-width="2"/>
    <text x="794" y="844" font-size="14" font-weight="650" fill="#22231f">Your private GitHub repo</text>
  </g>
</svg>
