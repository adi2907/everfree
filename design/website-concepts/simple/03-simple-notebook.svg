<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="900" viewBox="0 0 1440 900">
  <rect width="1440" height="900" fill="#f4f0e7"/>
  <style>
    .sans{font-family:Inter,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
    .serif{font-family:Georgia,"Times New Roman",serif}
    .mono{font-family:"SFMono-Regular",Consolas,monospace}
  </style>

  <!-- Quiet notebook rules -->
  <line x1="112" y1="0" x2="112" y2="900" stroke="#d9a09a" opacity=".65"/>
  <g stroke="#ddd8cd" opacity=".7">
    <line x1="0" y1="120" x2="1440" y2="120"/>
    <line x1="0" y1="170" x2="1440" y2="170"/>
    <line x1="0" y1="220" x2="1440" y2="220"/>
    <line x1="0" y1="270" x2="1440" y2="270"/>
    <line x1="0" y1="320" x2="1440" y2="320"/>
    <line x1="0" y1="370" x2="1440" y2="370"/>
    <line x1="0" y1="420" x2="1440" y2="420"/>
    <line x1="0" y1="470" x2="1440" y2="470"/>
    <line x1="0" y1="520" x2="1440" y2="520"/>
    <line x1="0" y1="570" x2="1440" y2="570"/>
    <line x1="0" y1="620" x2="1440" y2="620"/>
    <line x1="0" y1="670" x2="1440" y2="670"/>
    <line x1="0" y1="720" x2="1440" y2="720"/>
    <line x1="0" y1="770" x2="1440" y2="770"/>
    <line x1="0" y1="820" x2="1440" y2="820"/>
  </g>

  <g class="sans">
    <text x="145" y="75" font-size="21" font-weight="750" fill="#292a26">EverFree</text>
    <text x="1120" y="73" font-size="13" fill="#76776f">About</text>
    <text x="1190" y="73" font-size="13" fill="#76776f">GitHub</text>
    <rect x="1270" y="47" width="126" height="39" rx="5" fill="#496f58"/>
    <text x="1333" y="72" font-size="13" font-weight="650" fill="#fff" text-anchor="middle">Get EverFree</text>
  </g>

  <g>
    <text x="150" y="195" class="mono" font-size="12" letter-spacing="1.6" fill="#496f58">A NOTE ABOUT NOTES</text>
    <text x="145" y="280" class="serif" font-size="61" fill="#292a26">Keep the writing.</text>
    <text x="145" y="348" class="serif" font-size="61" fill="#292a26">Lose the lock-in.</text>
    <text x="150" y="408" class="sans" font-size="18" fill="#62645d">Import your Evernote archive once.</text>
    <text x="150" y="438" class="sans" font-size="18" fill="#62645d">Keep ordinary Markdown files forever.</text>
    <rect x="150" y="484" width="166" height="49" rx="5" fill="#496f58"/>
    <text x="233" y="515" class="sans" font-size="14" font-weight="650" fill="#fff" text-anchor="middle">Download for Mac</text>
    <text x="344" y="515" class="sans" font-size="14" font-weight="650" fill="#292a26">Open web app →</text>
  </g>

  <!-- Paper note -->
  <g transform="translate(740 155) rotate(1 280 280)">
    <rect x="9" y="11" width="550" height="570" rx="3" fill="#c9c3b7" opacity=".45"/>
    <rect width="550" height="570" rx="3" fill="#fffdf8" stroke="#cfc9bc"/>
    <line x1="56" y1="0" x2="56" y2="570" stroke="#e4b1aa"/>
    <g stroke="#e8e3d9">
      <line x1="0" y1="86" x2="550" y2="86"/>
      <line x1="0" y1="126" x2="550" y2="126"/>
      <line x1="0" y1="166" x2="550" y2="166"/>
      <line x1="0" y1="206" x2="550" y2="206"/>
      <line x1="0" y1="246" x2="550" y2="246"/>
      <line x1="0" y1="286" x2="550" y2="286"/>
      <line x1="0" y1="326" x2="550" y2="326"/>
      <line x1="0" y1="366" x2="550" y2="366"/>
      <line x1="0" y1="406" x2="550" y2="406"/>
      <line x1="0" y1="446" x2="550" y2="446"/>
      <line x1="0" y1="486" x2="550" y2="486"/>
      <line x1="0" y1="526" x2="550" y2="526"/>
    </g>
    <text x="84" y="58" class="mono" font-size="10" fill="#8b8c84">Journal/June 22.md</text>
    <text x="83" y="117" class="serif" font-size="28" fill="#292a26">A quieter archive</text>
    <text x="84" y="157" class="sans" font-size="13" fill="#555750">Today I moved years of notes into plain text.</text>
    <text x="84" y="197" class="sans" font-size="13" fill="#555750">Nothing is trapped. Nothing requires a subscription.</text>
    <text x="84" y="237" class="sans" font-size="13" fill="#555750">The folder is mine, and its history is backed up.</text>
    <text x="84" y="317" class="sans" font-size="13" font-weight="650" fill="#496f58">What changed</text>
    <text x="84" y="357" class="sans" font-size="13" fill="#555750">✓ Notes became Markdown files</text>
    <text x="84" y="397" class="sans" font-size="13" fill="#555750">✓ Attachments stayed beside them</text>
    <text x="84" y="437" class="sans" font-size="13" fill="#555750">✓ GitHub keeps the history</text>
    <rect x="82" y="493" width="330" height="37" rx="4" fill="#f2f0ea"/>
    <text x="99" y="516" class="mono" font-size="9" fill="#76776f">saved · private/everfree-notes</text>
  </g>

  <g class="sans">
    <line x1="145" y1="651" x2="650" y2="651" stroke="#bdb8ad"/>
    <text x="145" y="694" font-size="14" font-weight="700" fill="#292a26">Import once.</text>
    <text x="145" y="723" font-size="13" fill="#76776f">The Mac app handles the migration.</text>
    <text x="145" y="775" font-size="14" font-weight="700" fill="#292a26">Write anywhere.</text>
    <text x="145" y="804" font-size="13" fill="#76776f">Use EverFree or any Markdown editor.</text>
    <text x="145" y="856" font-size="14" font-weight="700" fill="#292a26">Leave whenever.</text>
    <text x="265" y="856" font-size="13" fill="#76776f">There is no proprietary format to escape.</text>
  </g>
</svg>
