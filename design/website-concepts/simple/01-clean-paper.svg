<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="900" viewBox="0 0 1440 900">
  <rect width="1440" height="900" fill="#f8f8f5"/>
  <style>
    .sans{font-family:Inter,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
    .mono{font-family:"SFMono-Regular",Consolas,monospace}
  </style>

  <g class="sans">
    <circle cx="67" cy="52" r="14" fill="#397052"/>
    <path d="M60 52h14M67 45v14" stroke="#fff" stroke-width="2"/>
    <text x="92" y="59" font-size="20" font-weight="700" fill="#242522">EverFree</text>
    <text x="1140" y="58" font-size="14" fill="#73756e">GitHub</text>
    <text x="1222" y="58" font-size="14" fill="#73756e">Sign in</text>
    <rect x="1292" y="31" width="105" height="41" rx="6" fill="#397052"/>
    <text x="1345" y="57" font-size="13" font-weight="650" fill="#fff" text-anchor="middle">Download</text>
  </g>
  <line x1="43" y1="94" x2="1397" y2="94" stroke="#deded8"/>

  <g class="sans" text-anchor="middle">
    <text x="720" y="177" font-size="13" font-weight="700" letter-spacing="2.4" fill="#397052">NOTES WITHOUT THE LOCK-IN</text>
    <text x="720" y="259" font-size="60" font-weight="650" letter-spacing="-2.5" fill="#242522">Your notes, without the lock-in.</text>
    <text x="720" y="311" font-size="19" fill="#73756e">Move from Evernote to plain Markdown and keep everything</text>
    <text x="720" y="341" font-size="19" fill="#73756e">inside your own private GitHub repository.</text>
    <rect x="545" y="386" width="169" height="50" rx="6" fill="#397052"/>
    <text x="630" y="417" font-size="14" font-weight="650" fill="#fff">Download for Mac</text>
    <rect x="728" y="386" width="157" height="50" rx="6" fill="#fff" stroke="#c9cac4"/>
    <text x="807" y="417" font-size="14" font-weight="650" fill="#242522">Open web app</text>
  </g>

  <!-- Simple product window -->
  <g transform="translate(233 485)">
    <rect width="974" height="318" rx="8" fill="#fff" stroke="#d7d7d1"/>
    <rect width="974" height="35" rx="8" fill="#f0f0ec"/>
    <circle cx="18" cy="17" r="4" fill="#c4c5be"/>
    <circle cx="32" cy="17" r="4" fill="#c4c5be"/>
    <circle cx="46" cy="17" r="4" fill="#c4c5be"/>

    <rect y="35" width="215" height="283" fill="#f3f3ef"/>
    <text x="20" y="70" class="sans" font-size="13" font-weight="700" fill="#242522">Notes</text>
    <rect x="15" y="84" width="185" height="29" rx="5" fill="#e8e8e3"/>
    <text x="27" y="103" class="sans" font-size="10" fill="#85877f">Search notes</text>
    <text x="20" y="143" class="sans" font-size="10" font-weight="700" fill="#85877f">JOURNAL</text>
    <rect x="14" y="154" width="187" height="32" rx="5" fill="#e1eae4"/>
    <text x="30" y="175" class="sans" font-size="11" fill="#397052">Monday, June 22</text>
    <text x="30" y="208" class="sans" font-size="11" fill="#686a64">Reading list</text>
    <text x="30" y="239" class="sans" font-size="11" fill="#686a64">Ideas</text>

    <text x="253" y="72" class="mono" font-size="9" fill="#85877f">Journal / Monday, June 22.md</text>
    <text x="275" y="127" class="sans" font-size="26" font-weight="650" fill="#242522">Monday, June 22</text>
    <text x="275" y="171" class="sans" font-size="14" fill="#555750">A quiet place to keep useful things.</text>
    <text x="275" y="215" class="sans" font-size="13" fill="#242522">Today I moved the archive into plain Markdown.</text>
    <text x="275" y="241" class="sans" font-size="13" fill="#242522">The files are readable, searchable, and mine.</text>
    <rect x="275" y="269" width="420" height="28" rx="4" fill="#f3f3ef"/>
    <text x="290" y="288" class="mono" font-size="9" fill="#73756e">Saved locally · Synced to private GitHub</text>
  </g>

  <g class="sans" text-anchor="middle">
    <text x="385" y="854" font-size="14" font-weight="650" fill="#242522">Import once</text>
    <text x="720" y="854" font-size="14" font-weight="650" fill="#242522">Plain Markdown</text>
    <text x="1055" y="854" font-size="14" font-weight="650" fill="#242522">Stored in your GitHub</text>
  </g>
</svg>
