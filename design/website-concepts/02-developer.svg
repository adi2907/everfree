<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="900" viewBox="0 0 1440 900">
  <rect width="1440" height="900" fill="#11130f"/>
  <style>
    .sans { font-family: Inter, "Helvetica Neue", Arial, sans-serif; }
    .mono { font-family: "SFMono-Regular", Consolas, monospace; }
  </style>

  <rect x="24" y="20" width="1392" height="60" rx="2" fill="#171a15" stroke="#30342b"/>
  <circle cx="55" cy="50" r="12" fill="#9ba66a"/>
  <text x="79" y="57" class="sans" font-size="20" font-weight="700" fill="#ece9df">EverFree</text>
  <text x="1040" y="55" class="mono" font-size="12" fill="#8c9187">DOCS</text>
  <text x="1110" y="55" class="mono" font-size="12" fill="#8c9187">SOURCE</text>
  <rect x="1210" y="34" width="174" height="32" fill="#9ba66a"/>
  <text x="1297" y="55" class="mono" font-size="11" font-weight="700" fill="#11130f" text-anchor="middle">OPEN WEB APP ↗</text>

  <g class="sans">
    <text x="62" y="151" class="mono" font-size="12" fill="#d2a85a">EVERNOTE → MARKDOWN → GIT</text>
    <text x="58" y="243" font-size="68" font-weight="700" letter-spacing="-3" fill="#ece9df">Exit the app.</text>
    <text x="58" y="316" font-size="68" font-weight="700" letter-spacing="-3" fill="#ece9df">Keep the notes.</text>
    <text x="62" y="376" font-size="18" fill="#a5aa9e">EverFree converts your Evernote archive to Markdown</text>
    <text x="62" y="406" font-size="18" fill="#a5aa9e">and syncs it to a private GitHub repository you control.</text>
    <rect x="62" y="459" width="164" height="45" fill="#d2a85a"/>
    <text x="144" y="487" class="mono" font-size="12" font-weight="700" fill="#11130f" text-anchor="middle">START MIGRATION</text>
    <rect x="238" y="459" width="151" height="45" fill="none" stroke="#555a4d"/>
    <text x="314" y="487" class="mono" font-size="12" fill="#ece9df" text-anchor="middle">VIEW ON GITHUB</text>
  </g>

  <!-- Technical product composition -->
  <g transform="translate(625 126)">
    <rect width="752" height="472" fill="#171a15" stroke="#40453a"/>
    <rect width="752" height="35" fill="#20231d"/>
    <text x="18" y="23" class="mono" font-size="10" fill="#8c9187">everfree-notes / main</text>
    <text x="704" y="23" class="mono" font-size="10" fill="#9ba66a">SYNCED</text>

    <rect y="35" width="222" height="437" fill="#141611"/>
    <text x="18" y="69" class="mono" font-size="10" fill="#8c9187">EXPLORER</text>
    <text x="19" y="102" class="mono" font-size="12" fill="#ece9df">▾ everfree-notes</text>
    <text x="37" y="132" class="mono" font-size="12" fill="#9ba66a">▾ Journal</text>
    <rect x="29" y="145" width="176" height="28" fill="#272b23"/>
    <text x="51" y="164" class="mono" font-size="11" fill="#ece9df">today.md</text>
    <text x="51" y="193" class="mono" font-size="11" fill="#8c9187">reading.md</text>
    <text x="37" y="229" class="mono" font-size="12" fill="#9ba66a">▸ Projects</text>
    <text x="37" y="259" class="mono" font-size="12" fill="#9ba66a">▸ Archive</text>
    <text x="37" y="289" class="mono" font-size="12" fill="#8c9187">  .gitignore</text>
    <line x1="15" y1="327" x2="207" y2="327" stroke="#30342b"/>
    <text x="18" y="353" class="mono" font-size="10" fill="#8c9187">RECENT COMMITS</text>
    <circle cx="26" cy="382" r="4" fill="#9ba66a"/>
    <text x="40" y="386" class="mono" font-size="10" fill="#ece9df">Update today.md</text>
    <text x="40" y="403" class="mono" font-size="9" fill="#696e64">2 min ago</text>
    <line x1="26" y1="388" x2="26" y2="426" stroke="#555a4d"/>
    <circle cx="26" cy="430" r="4" fill="#555a4d"/>
    <text x="40" y="434" class="mono" font-size="10" fill="#a5aa9e">Initial import</text>
    <text x="40" y="451" class="mono" font-size="9" fill="#696e64">1 day ago</text>

    <text x="253" y="74" class="mono" font-size="10" fill="#8c9187">Journal / today.md</text>
    <text x="253" y="127" class="sans" font-size="29" font-weight="650" fill="#ece9df">Today</text>
    <text x="253" y="172" class="sans" font-size="15" fill="#b8bcb1">My notes should outlive the tools I use.</text>
    <text x="253" y="221" class="sans" font-size="14" fill="#ece9df">The archive is plain text now. There is no export</text>
    <text x="253" y="247" class="sans" font-size="14" fill="#ece9df">deadline, proprietary database, or account lock-in.</text>
    <rect x="253" y="283" width="461" height="105" fill="#11130f" stroke="#30342b"/>
    <text x="272" y="311" class="mono" font-size="11" fill="#9ba66a">$ git log --oneline</text>
    <text x="272" y="338" class="mono" font-size="11" fill="#d2a85a">7ab91c2</text>
    <text x="339" y="338" class="mono" font-size="11" fill="#a5aa9e">Update Journal/today.md</text>
    <text x="272" y="363" class="mono" font-size="11" fill="#d2a85a">3e4d088</text>
    <text x="339" y="363" class="mono" font-size="11" fill="#a5aa9e">Initial import from EverFree</text>
    <text x="253" y="428" class="mono" font-size="10" fill="#8c9187">UTF-8 · Markdown · private repository</text>
  </g>

  <!-- Migration command strip -->
  <rect x="24" y="644" width="1392" height="86" fill="#171a15" stroke="#30342b"/>
  <text x="57" y="677" class="mono" font-size="10" fill="#8c9187">MIGRATION PIPELINE</text>
  <text x="57" y="707" class="mono" font-size="14" fill="#9ba66a">01  IMPORT ARCHIVE</text>
  <text x="366" y="707" class="mono" font-size="14" fill="#d2a85a">02  CONVERT TO .MD</text>
  <text x="704" y="707" class="mono" font-size="14" fill="#9ba66a">03  COMMIT HISTORY</text>
  <text x="1044" y="707" class="mono" font-size="14" fill="#d2a85a">04  PUSH PRIVATE</text>

  <g class="sans">
    <text x="58" y="790" font-size="25" font-weight="650" fill="#ece9df">No proprietary database.</text>
    <text x="58" y="827" font-size="25" font-weight="650" fill="#ece9df">No subscription.</text>
    <text x="58" y="864" font-size="25" font-weight="650" fill="#ece9df">No hostage situation.</text>
    <line x1="534" y1="776" x2="534" y2="866" stroke="#30342b"/>
    <text x="580" y="809" font-size="36" font-weight="650" letter-spacing="-1.4" fill="#9ba66a">Your repo. Your history.</text>
    <text x="580" y="855" font-size="36" font-weight="650" letter-spacing="-1.4" fill="#9ba66a">Your files.</text>
  </g>
</svg>
