<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="900" viewBox="0 0 1440 900">
  <rect width="1440" height="900" fill="#e9e9e5"/>
  <style>
    .ui{font-family:Inter,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
    .mono{font-family:"SFMono-Regular",Consolas,monospace}
  </style>

  <!-- App window -->
  <rect x="22" y="20" width="1396" height="858" rx="12" fill="#fff" stroke="#cfcfca"/>
  <rect x="22" y="20" width="1396" height="44" rx="12" fill="#f5f5f2"/>
  <circle cx="45" cy="42" r="6" fill="#ff5f57"/>
  <circle cx="65" cy="42" r="6" fill="#febc2e"/>
  <circle cx="85" cy="42" r="6" fill="#28c840"/>
  <text x="720" y="47" class="ui" font-size="12" fill="#888983" text-anchor="middle">EverFree</text>

  <!-- Notebook rail -->
  <rect x="22" y="64" width="238" height="814" fill="#f1f1ed"/>
  <line x1="260" y1="64" x2="260" y2="878" stroke="#dcdcd6"/>
  <g class="ui">
    <circle cx="54" cy="100" r="15" fill="#47735a"/>
    <path d="M47 100h14M54 93v14" stroke="#fff" stroke-width="1.8"/>
    <text x="78" y="106" font-size="17" font-weight="700" fill="#262722">EverFree</text>
    <rect x="39" y="134" width="204" height="34" rx="7" fill="#e4e4df"/>
    <circle cx="55" cy="151" r="5" fill="none" stroke="#85877f"/>
    <path d="M59 155l5 5" stroke="#85877f"/>
    <text x="72" y="156" font-size="11" fill="#85877f">Search notes</text>

    <text x="42" y="207" font-size="10" font-weight="700" letter-spacing="1.3" fill="#92938d">LIBRARY</text>
    <rect x="34" y="222" width="210" height="38" rx="7" fill="#dce7df"/>
    <text x="48" y="246" font-size="13" font-weight="600" fill="#47735a">All notes</text>
    <text x="218" y="246" font-size="11" fill="#6f716a" text-anchor="end">42</text>
    <text x="48" y="283" font-size="13" fill="#5f615b">Recent</text>
    <text x="48" y="320" font-size="13" fill="#5f615b">Scratch</text>

    <text x="42" y="371" font-size="10" font-weight="700" letter-spacing="1.3" fill="#92938d">NOTEBOOKS</text>
    <text x="48" y="408" font-size="13" fill="#454740">Journal</text>
    <text x="48" y="445" font-size="13" fill="#454740">Projects</text>
    <text x="48" y="482" font-size="13" fill="#454740">Reading</text>
    <text x="48" y="519" font-size="13" fill="#454740">Archive</text>
    <text x="216" y="519" font-size="20" fill="#92938d">+</text>

    <line x1="39" y1="817" x2="242" y2="817" stroke="#d6d6d0"/>
    <circle cx="51" cy="844" r="4" fill="#4c9466"/>
    <text x="64" y="848" font-size="10" fill="#85877f">Synced</text>
    <text x="222" y="848" font-size="14" fill="#85877f">•••</text>
  </g>

  <!-- Note list -->
  <rect x="260" y="64" width="326" height="814" fill="#fafaf8"/>
  <line x1="586" y1="64" x2="586" y2="878" stroke="#e1e1dc"/>
  <g class="ui">
    <text x="289" y="108" font-size="23" font-weight="700" fill="#262722">All notes</text>
    <rect x="525" y="85" width="35" height="35" rx="7" fill="#47735a"/>
    <path d="M535 102h15M542.5 94.5v15" stroke="#fff" stroke-width="1.8"/>

    <rect x="274" y="137" width="297" height="105" rx="8" fill="#e9efe9"/>
    <text x="291" y="166" font-size="14" font-weight="650" fill="#262722">A quieter archive</text>
    <text x="291" y="190" font-size="12" fill="#696b65">Today I moved years of notes into</text>
    <text x="291" y="210" font-size="12" fill="#696b65">plain text. Nothing is trapped…</text>
    <text x="291" y="231" font-size="10" fill="#8c8e87">Today · Journal</text>

    <line x1="287" y1="261" x2="558" y2="261" stroke="#e4e4df"/>
    <text x="291" y="292" font-size="14" font-weight="600" fill="#33342f">Ideas for the garden</text>
    <text x="291" y="316" font-size="12" fill="#777972">Native plants, shade near the wall…</text>
    <text x="291" y="339" font-size="10" fill="#999a94">Yesterday · Projects</text>

    <line x1="287" y1="361" x2="558" y2="361" stroke="#e4e4df"/>
    <text x="291" y="393" font-size="14" font-weight="600" fill="#33342f">Books to revisit</text>
    <text x="291" y="417" font-size="12" fill="#777972">Le Guin, Didion, Oliver Sacks…</text>
    <text x="291" y="440" font-size="10" fill="#999a94">Monday · Reading</text>

    <line x1="287" y1="462" x2="558" y2="462" stroke="#e4e4df"/>
    <text x="291" y="494" font-size="14" font-weight="600" fill="#33342f">June planning</text>
    <text x="291" y="518" font-size="12" fill="#777972">Three things that matter this month…</text>
    <text x="291" y="541" font-size="10" fill="#999a94">June 1 · Journal</text>
  </g>

  <!-- Editor -->
  <rect x="586" y="64" width="832" height="814" fill="#fff"/>
  <g class="ui">
    <text x="626" y="105" font-size="11" fill="#8d8f88">Journal</text>
    <text x="1375" y="105" font-size="11" fill="#8d8f88" text-anchor="end">Saved just now</text>
    <text x="1341" y="106" font-size="17" fill="#767872">•••</text>
    <line x1="614" y1="125" x2="1390" y2="125" stroke="#eeeeea"/>

    <text x="755" y="208" font-size="39" font-weight="700" letter-spacing="-1.2" fill="#252621">A quieter archive</text>
    <text x="755" y="249" font-size="13" fill="#969790">June 22, 2026</text>
    <text x="755" y="320" font-size="17" fill="#343530">Today I moved years of notes into plain text.</text>
    <text x="755" y="357" font-size="17" fill="#343530">Nothing is trapped. Nothing requires a subscription.</text>
    <text x="755" y="394" font-size="17" fill="#343530">The folder is mine, and its history is backed up.</text>

    <text x="755" y="475" font-size="23" font-weight="650" fill="#252621">What changed</text>
    <text x="757" y="527" font-size="16" fill="#343530">✓  Notes became Markdown files</text>
    <text x="757" y="565" font-size="16" fill="#343530">✓  Attachments stayed beside them</text>
    <text x="757" y="603" font-size="16" fill="#343530">✓  GitHub keeps the history</text>

    <rect x="755" y="675" width="487" height="56" rx="6" fill="#f4f5f1"/>
    <text x="776" y="700" class="mono" font-size="10" fill="#47735a">Journal/A quieter archive.md</text>
    <text x="776" y="719" class="mono" font-size="9" fill="#8a8c85">private repository · main</text>

    <!-- Quiet formatting bar -->
    <rect x="809" y="811" width="390" height="43" rx="9" fill="#fafaf8" stroke="#dfdfda"/>
    <text x="835" y="838" font-size="14" font-weight="700" fill="#60625c">B</text>
    <text x="874" y="838" font-size="14" font-style="italic" fill="#60625c">I</text>
    <text x="912" y="838" font-size="14" fill="#60625c">H</text>
    <line x1="944" y1="822" x2="944" y2="844" stroke="#d6d6d0"/>
    <text x="968" y="838" font-size="14" fill="#60625c">☷</text>
    <text x="1008" y="838" font-size="14" fill="#60625c">✓</text>
    <text x="1048" y="838" font-size="14" fill="#60625c">“</text>
    <text x="1088" y="838" font-size="14" fill="#60625c">⌁</text>
    <line x1="1120" y1="822" x2="1120" y2="844" stroke="#d6d6d0"/>
    <text x="1145" y="838" font-size="13" fill="#47735a">Ask AI</text>
  </g>
</svg>
