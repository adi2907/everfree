<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="900" viewBox="0 0 1440 900">
  <rect width="1440" height="900" fill="#e9e9e5"/>
  <style>
    .ui{font-family:Inter,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
    .mono{font-family:"SFMono-Regular",Consolas,monospace}
  </style>

  <rect x="22" y="20" width="1396" height="858" rx="12" fill="#fff" stroke="#cfcfca"/>
  <rect x="22" y="20" width="1396" height="44" rx="12" fill="#f5f5f2"/>
  <circle cx="45" cy="42" r="6" fill="#ff5f57"/>
  <circle cx="65" cy="42" r="6" fill="#febc2e"/>
  <circle cx="85" cy="42" r="6" fill="#28c840"/>
  <text x="720" y="47" class="ui" font-size="12" fill="#888983" text-anchor="middle">EverFree</text>

  <!-- Collapsed navigation: normal note-list pane hides while AI is open -->
  <rect x="22" y="64" width="66" height="814" fill="#f1f1ed"/>
  <line x1="88" y1="64" x2="88" y2="878" stroke="#dcdcd6"/>
  <g class="ui" text-anchor="middle">
    <circle cx="55" cy="101" r="15" fill="#47735a"/>
    <path d="M48 101h14M55 94v14" stroke="#fff" stroke-width="1.8"/>
    <rect x="36" y="145" width="38" height="38" rx="8" fill="#dce7df"/>
    <text x="55" y="170" font-size="16" fill="#47735a">☰</text>
    <text x="55" y="227" font-size="17" fill="#7b7d75">⌕</text>
    <text x="55" y="281" font-size="19" fill="#7b7d75">＋</text>
    <circle cx="55" cy="829" r="4" fill="#4c9466"/>
    <text x="55" y="859" font-size="15" fill="#7b7d75">☼</text>
  </g>

  <!-- Editor stays spacious -->
  <rect x="88" y="64" width="903" height="814" fill="#fff"/>
  <line x1="991" y1="64" x2="991" y2="878" stroke="#deded8"/>
  <g class="ui">
    <rect x="119" y="82" width="77" height="34" rx="7" fill="#f4f4f0"/>
    <text x="158" y="103" font-size="11" fill="#666861" text-anchor="middle">☰ Notes</text>
    <text x="217" y="103" font-size="11" fill="#8b8d86">Journal / A quieter archive</text>
    <text x="952" y="103" font-size="11" fill="#8b8d86" text-anchor="end">Saved</text>
    <line x1="113" y1="129" x2="966" y2="129" stroke="#eeeeea"/>

    <text x="269" y="220" font-size="40" font-weight="700" letter-spacing="-1.4" fill="#252621">A quieter archive</text>
    <text x="272" y="263" font-size="12" fill="#9a9b95">JUNE 22, 2026 · JOURNAL</text>
    <text x="269" y="343" font-size="17" fill="#383934">Today I moved years of notes into plain text.</text>
    <text x="269" y="382" font-size="17" fill="#383934">Nothing is trapped. Nothing requires a subscription.</text>
    <text x="269" y="421" font-size="17" fill="#383934">The folder is mine, and its history is backed up.</text>

    <text x="269" y="505" font-size="24" font-weight="650" fill="#252621">Why Markdown lasts</text>
    <rect x="263" y="534" width="591" height="111" rx="7" fill="#eef3ef"/>
    <text x="283" y="562" font-size="12" font-weight="650" fill="#315f47">AI draft preview</text>
    <text x="283" y="592" font-size="14" fill="#343530">Markdown is readable without a specific application, portable across</text>
    <text x="283" y="618" font-size="14" fill="#343530">platforms, and easy to version with Git.</text>

    <rect x="269" y="684" width="128" height="34" rx="6" fill="#315f47"/>
    <text x="333" y="706" font-size="10" font-weight="650" fill="#fff" text-anchor="middle">Insert into note</text>
    <rect x="408" y="684" width="89" height="34" rx="6" fill="#fff" stroke="#d1d2cc"/>
    <text x="452" y="706" font-size="10" fill="#555750" text-anchor="middle">Try again</text>
    <text x="522" y="706" font-size="10" fill="#8c8e87">Discard</text>

    <line x1="269" y1="773" x2="854" y2="773" stroke="#e3e3de"/>
    <text x="269" y="806" class="mono" font-size="9" fill="#8d8f88">Journal/A quieter archive.md</text>
    <text x="854" y="806" class="mono" font-size="9" fill="#47735a" text-anchor="end">PRIVATE · SYNCED</text>
  </g>

  <!-- AI drawer: replaces the hidden note-list width, rather than becoming a fourth pane -->
  <rect x="991" y="64" width="427" height="814" fill="#f8f8f5"/>
  <g class="ui">
    <text x="1018" y="104" font-size="15" font-weight="700" fill="#292a25">AI assistant</text>
    <rect x="1281" y="83" width="78" height="31" rx="6" fill="#e7eee9"/>
    <text x="1320" y="103" font-size="9" font-weight="650" fill="#315f47" text-anchor="middle">LOCAL</text>
    <text x="1385" y="104" font-size="18" fill="#7d7f78">×</text>
    <line x1="1007" y1="129" x2="1402" y2="129" stroke="#deded8"/>

    <text x="1018" y="162" font-size="10" font-weight="700" letter-spacing="1" fill="#8b8d86">CONTEXT</text>
    <rect x="1017" y="177" width="150" height="31" rx="6" fill="#e5eee8"/>
    <text x="1031" y="197" font-size="10" fill="#315f47">✓ Current note</text>
    <rect x="1176" y="177" width="169" height="31" rx="6" fill="#fff" stroke="#d7d8d2"/>
    <text x="1190" y="197" font-size="10" fill="#73756e">○ Entire notebook</text>
    <rect x="1017" y="215" width="130" height="31" rx="6" fill="#e5eee8"/>
    <text x="1031" y="235" font-size="10" fill="#315f47">✓ Web search</text>

    <rect x="1067" y="275" width="312" height="63" rx="10" fill="#315f47"/>
    <text x="1086" y="300" font-size="12" fill="#fff">Research why Markdown is durable</text>
    <text x="1086" y="321" font-size="12" fill="#fff">and draft a concise paragraph.</text>

    <rect x="1017" y="361" width="362" height="61" rx="8" fill="#fff" stroke="#d9dad4"/>
    <text x="1035" y="386" font-size="10" font-weight="650" fill="#315f47">Searching the web</text>
    <text x="1035" y="406" font-size="10" fill="#85877f">3 sources reviewed · citations ready</text>

    <rect x="1017" y="442" width="362" height="246" rx="9" fill="#fff" stroke="#d9dad4"/>
    <text x="1036" y="470" font-size="11" font-weight="700" fill="#292a25">Draft</text>
    <text x="1036" y="500" font-size="12" fill="#464741">Markdown lasts because its content remains</text>
    <text x="1036" y="522" font-size="12" fill="#464741">readable as plain text. It works across editors</text>
    <text x="1036" y="544" font-size="12" fill="#464741">and operating systems, while Git preserves a</text>
    <text x="1036" y="566" font-size="12" fill="#464741">transparent history of every change.</text>
    <line x1="1036" y1="588" x2="1360" y2="588" stroke="#ecece7"/>
    <text x="1036" y="613" font-size="9" font-weight="650" fill="#85877f">SOURCES</text>
    <text x="1036" y="636" font-size="10" fill="#315f47">CommonMark specification</text>
    <text x="1036" y="657" font-size="10" fill="#315f47">Git documentation</text>

    <rect x="1017" y="719" width="362" height="105" rx="9" fill="#fff" stroke="#cfd0ca"/>
    <text x="1036" y="749" font-size="11" fill="#999b94">Ask about this note…</text>
    <rect x="1030" y="783" width="81" height="25" rx="5" fill="#f1f2ee"/>
    <text x="1070" y="800" font-size="9" fill="#73756e" text-anchor="middle">Research⌄</text>
    <circle cx="1347" cy="795" r="15" fill="#315f47"/>
    <path d="M1341 796l6-6 6 6M1347 790v11" fill="none" stroke="#fff" stroke-width="1.7"/>
    <text x="1018" y="853" font-size="9" fill="#999b94">Notes pane returns when AI closes.</text>
  </g>
</svg>
