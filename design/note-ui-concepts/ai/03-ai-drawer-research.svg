<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="900" viewBox="0 0 1440 900">
  <rect width="1440" height="900" fill="#e9e9e5"/>
  <style>
    .ui{font-family:Inter,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
    .mono{font-family:"SFMono-Regular",Consolas,monospace}
  </style>
  <rect x="22" y="20" width="1396" height="858" rx="12" fill="#fff" stroke="#cfcfca"/>
  <rect x="22" y="20" width="1396" height="44" rx="12" fill="#f5f5f2"/>
  <circle cx="45" cy="42" r="6" fill="#ff5f57"/><circle cx="65" cy="42" r="6" fill="#febc2e"/><circle cx="85" cy="42" r="6" fill="#28c840"/>
  <text x="720" y="47" class="ui" font-size="12" fill="#888983" text-anchor="middle">EverFree</text>

  <!-- Compact sidebar -->
  <rect x="22" y="64" width="250" height="814" fill="#f3f3ef"/>
  <line x1="272" y1="64" x2="272" y2="878" stroke="#deded8"/>
  <g class="ui">
    <text x="50" y="108" font-size="19" font-weight="750" fill="#272823">EverFree</text>
    <rect x="40" y="135" width="211" height="36" rx="7" fill="#e7e7e2"/>
    <text x="57" y="158" font-size="11" fill="#888a83">⌕  Search notes</text>
    <text x="46" y="210" font-size="10" font-weight="700" letter-spacing="1.2" fill="#93958e">NOTES</text>
    <rect x="37" y="225" width="224" height="76" rx="7" fill="#dce7df"/>
    <text x="53" y="251" font-size="13" font-weight="650" fill="#315f47">A quieter archive</text>
    <text x="53" y="273" font-size="11" fill="#6e7069">Nothing is trapped…</text>
    <text x="53" y="291" font-size="9" fill="#8e9089">Today · Journal</text>
    <text x="53" y="338" font-size="13" font-weight="600" fill="#393a35">Ideas for the garden</text>
    <text x="53" y="360" font-size="11" fill="#777972">Native plants…</text>
    <line x1="41" y1="817" x2="254" y2="817" stroke="#d9d9d3"/>
    <circle cx="52" cy="846" r="4" fill="#4e9869"/>
    <text x="65" y="850" font-size="10" fill="#85877f">All changes saved</text>
  </g>

  <!-- Document center -->
  <rect x="272" y="64" width="760" height="814" fill="#fff"/>
  <line x1="1032" y1="64" x2="1032" y2="878" stroke="#deded8"/>
  <g class="ui">
    <text x="311" y="102" font-size="11" fill="#8b8d86">Journal / A quieter archive</text>
    <text x="995" y="102" font-size="11" fill="#8b8d86" text-anchor="end">Saved</text>
    <line x1="298" y1="129" x2="1006" y2="129" stroke="#eeeeea"/>

    <text x="409" y="221" font-size="40" font-weight="700" letter-spacing="-1.4" fill="#252621">A quieter archive</text>
    <text x="412" y="264" font-size="12" fill="#9a9b95">JUNE 22, 2026 · JOURNAL</text>
    <text x="409" y="343" font-size="17" fill="#383934">Today I moved years of notes into plain text.</text>
    <text x="409" y="382" font-size="17" fill="#383934">Nothing is trapped. Nothing requires a subscription.</text>
    <text x="409" y="421" font-size="17" fill="#383934">The folder is mine, and its history is backed up.</text>
    <text x="409" y="505" font-size="24" font-weight="650" fill="#252621">Why Markdown lasts</text>
    <rect x="403" y="534" width="537" height="103" rx="7" fill="#eef3ef"/>
    <text x="421" y="562" font-size="12" font-weight="650" fill="#315f47">AI draft preview</text>
    <text x="421" y="590" font-size="14" fill="#343530">Markdown is readable without a specific application,</text>
    <text x="421" y="615" font-size="14" fill="#343530">portable across platforms, and easy to version with Git.</text>
    <text x="409" y="689" class="mono" font-size="9" fill="#8d8f88">Sources will be inserted below the accepted passage.</text>
  </g>

  <!-- AI drawer -->
  <rect x="1032" y="64" width="386" height="814" fill="#f8f8f5"/>
  <g class="ui">
    <text x="1058" y="104" font-size="15" font-weight="700" fill="#292a25">AI assistant</text>
    <rect x="1282" y="83" width="72" height="31" rx="6" fill="#eef3ef"/>
    <text x="1318" y="103" font-size="9" font-weight="650" fill="#315f47" text-anchor="middle">LOCAL</text>
    <text x="1386" y="104" font-size="18" fill="#7d7f78">×</text>
    <line x1="1048" y1="129" x2="1402" y2="129" stroke="#deded8"/>

    <!-- Context controls -->
    <text x="1058" y="162" font-size="10" font-weight="700" letter-spacing="1" fill="#8b8d86">CONTEXT</text>
    <rect x="1057" y="177" width="160" height="31" rx="6" fill="#e5eee8"/>
    <text x="1071" y="197" font-size="10" fill="#315f47">✓ Current note</text>
    <rect x="1225" y="177" width="155" height="31" rx="6" fill="#fff" stroke="#d7d8d2"/>
    <text x="1239" y="197" font-size="10" fill="#73756e">○ Entire notebook</text>
    <rect x="1057" y="215" width="130" height="31" rx="6" fill="#e5eee8"/>
    <text x="1071" y="235" font-size="10" fill="#315f47">✓ Web search</text>

    <!-- User request -->
    <rect x="1090" y="275" width="291" height="62" rx="10" fill="#315f47"/>
    <text x="1108" y="300" font-size="12" fill="#fff">Research why Markdown is a durable</text>
    <text x="1108" y="321" font-size="12" fill="#fff">format and draft a short paragraph.</text>

    <!-- Tool activity -->
    <rect x="1057" y="360" width="324" height="61" rx="8" fill="#fff" stroke="#d9dad4"/>
    <text x="1074" y="385" font-size="10" font-weight="650" fill="#315f47">Searching the web</text>
    <text x="1074" y="405" font-size="10" fill="#85877f">3 sources reviewed · citations ready</text>

    <!-- Result -->
    <rect x="1057" y="441" width="324" height="251" rx="9" fill="#fff" stroke="#d9dad4"/>
    <text x="1075" y="468" font-size="11" font-weight="700" fill="#292a25">Draft</text>
    <text x="1075" y="498" font-size="12" fill="#464741">Markdown lasts because its content remains</text>
    <text x="1075" y="520" font-size="12" fill="#464741">readable as plain text. It is supported across</text>
    <text x="1075" y="542" font-size="12" fill="#464741">editors and operating systems, while Git can</text>
    <text x="1075" y="564" font-size="12" fill="#464741">preserve a transparent history of every change.</text>
    <line x1="1075" y1="586" x2="1363" y2="586" stroke="#ecece7"/>
    <text x="1075" y="610" font-size="9" font-weight="650" fill="#85877f">SOURCES</text>
    <text x="1075" y="632" font-size="10" fill="#315f47">CommonMark specification</text>
    <text x="1075" y="652" font-size="10" fill="#315f47">Git documentation</text>
    <rect x="1075" y="666" width="126" height="31" rx="6" fill="#315f47"/>
    <text x="1138" y="686" font-size="10" font-weight="650" fill="#fff" text-anchor="middle">Insert into note</text>
    <text x="1221" y="686" font-size="10" fill="#72746d">Try again</text>
    <text x="1291" y="686" font-size="10" fill="#8b8d86">Discard</text>

    <!-- Composer -->
    <rect x="1057" y="732" width="324" height="101" rx="9" fill="#fff" stroke="#cfd0ca"/>
    <text x="1074" y="760" font-size="11" fill="#999b94">Ask about this note…</text>
    <rect x="1069" y="790" width="76" height="25" rx="5" fill="#f1f2ee"/>
    <text x="1107" y="807" font-size="9" fill="#73756e" text-anchor="middle">Research⌄</text>
    <circle cx="1350" cy="802" r="15" fill="#315f47"/>
    <path d="M1344 803l6-6 6 6M1350 797v11" fill="none" stroke="#fff" stroke-width="1.7"/>
    <text x="1058" y="858" font-size="9" fill="#999b94">Only selected context is sent. Web search uses Serper.</text>
  </g>
</svg>
