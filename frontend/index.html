<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EverFree — Markdown Notes</title>
    <meta name="description" content="EverFree: A minimal, local-first Markdown note-taking app for macOS.">

    <!-- Toast UI Editor -->
    <link rel="stylesheet" href="https://uicdn.toast.com/editor/latest/toastui-editor.min.css">
    <link rel="stylesheet" href="https://uicdn.toast.com/editor/latest/toastui-editor-dark.min.css" id="tui-dark-css" disabled>
    <!-- Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
        rel="stylesheet">

    <link rel="icon" href="/static/assets/everfree-logo.svg">
    <link rel="stylesheet" href="/static/style.css">
</head>

<body>
    <!-- ── Sidebar ──────────────────────────────────────── -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <h1 class="logo">
                <img class="logo-mark" src="/static/assets/everfree-logo.svg" alt="">
                <span>EverFree</span>
            </h1>
            <button class="btn-icon" id="btn-new-notebook" title="New Notebook" aria-label="New Notebook">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <path d="M12 5v14M5 12h14" />
                </svg>
            </button>
        </div>

        <div class="sidebar-search">
            <input type="text" id="search-input" placeholder="Search notes…" aria-label="Search notes">
        </div>

        <nav class="notebook-list" id="notebook-list" aria-label="Notebooks">
            <!-- Populated by JS -->
        </nav>

        <!-- Sync Status Footer -->
        <div class="sidebar-footer">
            <div class="sync-status">
                <span class="sync-dot sync-off" id="sync-indicator"></span>
                <span class="sync-label" id="sync-text">Checking…</span>
            </div>
            <button class="btn-icon" id="btn-theme" title="Toggle light/dark mode" aria-label="Toggle theme">
                <svg id="theme-icon-dark" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/>
                </svg>
                <svg id="theme-icon-light" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none">
                    <circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
                </svg>
            </button>
            <button class="btn-icon" id="btn-sync" title="Sync with GitHub" aria-label="Sync">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="23 4 23 10 17 10" />
                    <polyline points="1 20 1 14 7 14" />
                    <path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15" />
                </svg>
            </button>
        </div>
    </aside>

    <!-- ── Main Content ─────────────────────────────────── -->
    <main class="main" id="main">
        <!-- Empty state -->
        <div class="empty-state" id="empty-state">
            <img class="empty-logo" src="/static/assets/everfree-logo.svg" alt="">
            <h2>Welcome to EverFree</h2>
            <p>Select a note from the sidebar or create a new one to get started.</p>
        </div>

        <!-- Editor (hidden until a note is selected) -->
        <div class="editor-container" id="editor-container" style="display:none;">
            <div class="editor-toolbar-top">
                <div class="note-meta">
                    <span class="note-breadcrumb" id="note-breadcrumb"></span>
                </div>
                <div class="editor-actions">
                    <span class="save-status" id="save-status"></span>
                    <button class="btn btn-save" id="btn-save" title="Save (Ctrl+S)">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v11a2 2 0 01-2 2z" />
                            <polyline points="17 21 17 13 7 13 7 21" />
                            <polyline points="7 3 7 8 15 8" />
                        </svg>
                        Save
                    </button>
                    <button class="btn btn-danger" id="btn-delete-note" title="Delete Note">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <polyline points="3 6 5 6 21 6" />
                            <path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6" />
                            <path d="M10 11v6M14 11v6" />
                        </svg>
                    </button>
                </div>
            </div>
            <div id="editor"></div>
        </div>
    </main>

    <!-- ── Modal for creating notebooks / notes ─────────── -->
    <div class="modal-overlay" id="modal-overlay" style="display:none;">
        <div class="modal">
            <h3 id="modal-title">Create</h3>
            <input type="text" id="modal-input" placeholder="Name…" aria-label="Name">
            <div class="modal-actions">
                <button class="btn btn-ghost" id="modal-cancel">Cancel</button>
                <button class="btn btn-primary" id="modal-confirm">Create</button>
            </div>
        </div>
    </div>

    <script src="https://uicdn.toast.com/editor/latest/toastui-editor-all.min.js"></script>
    <script src="/static/app.js"></script>
</body>

</html>
